<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <h1>Mening Telegram Web App ilovam</h1>

    <script>
        // Script yuklanganidan so'ng Telegram WebApp obyektini tekshirish
        // Ilova ishga tushganini bildirish uchun:
        window.Telegram.WebApp.ready();
        
        // Foydalanuvchi ranglar tizimiga moslashish (ixtiyoriy)
        document.body.style.setProperty('--tg-theme-bg-color', window.Telegram.WebApp.themeParams.bg_color);
    </script>
</body>
</html>
